<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            background-color: black;
            color: white;
        }

        .clickable {
            cursor: pointer;
        }
    </style>
    <title>Chat app</title>
</head>

<body>
    <div class="header">
        <h1>welcome!! lets have a chat</h1>
        <p id="error" style="color: red; position: absolute;"></p>

        <input id="inputUsername" type="text" placeholder="Enter username">
        <button id="joinBtn" onClick="addUser()">Join</button>
        <button id="leaveBtn" style="background-color: red; color: white; " onClick="removeUser()"
            disabled>Leave</button>
    </div>
    <hr>

    <div style="display: flex;" class="personalMsg">
        <div style="width: 50%;" class="onlineUsers">
            <p style="text-align: center;">Online Users</p>
            <ul id="online-users"></ul>
            <input type="text" name="" id="inputPrsnMsg" placeholder="Enter message">
            <button id="sendPrsnMsg" onClick="SendPrsnMsg()">Send</button>
        </div>
        <div style="width: 50%;" class="chatArea">
            <p style="text-align: center;" id="chatHeading">select user to chat with..</p>
        </div>
    </div>
    <hr>

    <div class="groupMsg">
        <h3>Send msg to server</h3>
        <input id="inputMsg" type="text" placeholder="Enter message">
        <button id="sendBtn">Send</button>


        <h3>msg from server</h3>
        <ul id="server-msg"></ul>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket
        let isJoined = false
        let selectedUser = undefined

        newSocket = () => {
            socket = io()

            socket.on("disconnect", () => {
                displayMsg("user disconnected")
                isJoined = false
                selectedUser = undefined
                document.getElementById('joinBtn').disabled = false
                document.getElementById('leaveBtn').disabled = true
                document.getElementById('chatHeading').innerHTML = "select user to chat with.."
            })

            socket.on("server-msg", (msgObj) => {
                console.log('msg from server:', msgObj.msg);
                updateServerMsg(msgObj)
            })

            socket.on("join-success", (msg) => {
                displayMsg(msg)
                isJoined = true
                document.getElementById('joinBtn').disabled = true
                document.getElementById('leaveBtn').disabled = false
            })

            socket.on("join-error", (msg) => {
                displayMsg(msg)
            })

            socket.on("online-users", (users) => {
                const userList = document.getElementById('online-users')
                userList.innerHTML = ""

                for (let user of users) {
                    let li = document.createElement('li')
                    li.classList.add('clickable', 'online-user')
                    li.addEventListener("click", updateSelectedUser)
                    li.innerHTML = user
                    userList.appendChild(li)
                }
            })

            socket.on("prsnMsgFromServer", ({ from, msg }) => {
                let pElement = document.createElement('p')
                let parentEl = document.getElementById('chatHeading')
                pElement.innerHTML = `${from}:${msg}`
                parentEl.appendChild(pElement)
            })
        }

        newSocket()     //new connection on page reload

        const sendBtn = document.getElementById('sendBtn')
        sendBtn.addEventListener('click', () => {
            let msg = document.getElementById('inputMsg').value

            if (!isJoined) {
                displayMsg("join chat before sending message")
                return
            }

            if (!msg) {
                displayMsg("enter a message before sending")
                return
            }

            document.getElementById('inputMsg').value = ""
            console.log('msg entered:', msg);

            if (!socket) {
                displayMsg("socket doesnt exist")
                return
            }
            socket.emit("client-msg", msg)      //msg sent with name "client-msg"
        })

        updateServerMsg = (msgObj) => {
            let parentUl = document.getElementById('server-msg')
            let childLi = document.createElement('li')
            childLi.innerHTML = `${msgObj.username} : ${msgObj.msg}`
            parentUl.appendChild(childLi)
        }

        addUser = () => {
            let username = document.getElementById('inputUsername').value
            if (username) {
                socket.emit("join", username)
            } else {
                displayMsg("username is missing")
            }
            document.getElementById('inputUsername').value = ""

        }

        removeUser = () => {
            socket.emit("leave")
            displayMsg("you left")
            isJoined = false
            selectedUser = undefined
            document.getElementById('joinBtn').disabled = false
            document.getElementById('leaveBtn').disabled = true
            document.getElementById('online-users').innerHTML = ""
            document.getElementById('chatHeading').innerHTML = `chat with ${selectedUser}`
        }

        displayMsg = (msg) => {
            document.getElementById('error').innerHTML = msg
            setTimeout(() => {
                document.getElementById('error').innerHTML = ""
            }, 3000)
        }

        updateSelectedUser = (event) => {
            selectedUser = event.target.innerHTML
            console.log("selectedUser : ", selectedUser);
            document.getElementById('chatHeading').innerHTML = `chat with ${selectedUser}`
        }

        SendPrsnMsg = () => {
            let msg = document.getElementById('inputPrsnMsg').value
            socket.emit("prsnMsgToServer", { msg, "to": selectedUser })
        }
    </script>
</body>

</html>
