<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat app</title>
</head>

<body>
    <div class="header">
        <h1>welcome!! lets have a chat</h1>
        <p id="error" style="color: red;"></p>

        <input id="inputUsername" type="text" placeholder="Enter username">
        <button id="joinBtn" onClick="addUser()">Join</button>
    </div>
    <hr>

    <div style="display: flex;" class="personalMsg">
        <div style="width: 50%;" class="onlineUsers">
            <p style="text-align: center;">Online Users</p>
        </div>
        <div style="width: 50%;" class="chatArea">
            <p style="text-align: center;">Username</p>
        </div>
    </div>
    <hr>

    <div class="groupMsg">
        <h3>Send msg to server</h3>
        <input id="inputMsg" type="text" placeholder="Enter message">
        <button id="sendBtn">Send</button>


        <h3>msg from server</h3>
        <ul id="server-msg"></ul>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket
        let isJoined = false

        newSocket = () => {
            socket = io()

            socket.on("disconnect", () => {
                isJoined = false;
            })

            socket.on("server-msg", (msgObj) => {
                console.log('msg from server:', msgObj.msg);
                updateServerMsg(msgObj)
            })

            socket.on("join-success", (msg) => {
                displayMsg(msg)
                isJoined = true
                document.getElementById('joinBtn').disabled = true
            })

            socket.on("join-error", (msg) => {
                displayMsg(msg)
            })
        }

        newSocket()     //new connection on page reload

        const sendBtn = document.getElementById('sendBtn')
        sendBtn.addEventListener('click', () => {
            let msg = document.getElementById('inputMsg').value

            if (!isJoined) {
                displayMsg("join chat before sending message")
                return
            }

            if (!msg) {
                displayMsg("enter a message before sending")
                return
            }

            document.getElementById('inputMsg').value = ""
            console.log('msg entered:', msg);

            if (!socket) {
                displayMsg("socket doesnt exist")
                return
            }
            socket.emit("client-msg", msg)      //msg sent with name "client-msg"
        })

        updateServerMsg = (msgObj) => {
            let parentUl = document.getElementById('server-msg')
            let childLi = document.createElement('li')
            childLi.innerHTML = `${msgObj.username} : ${msgObj.msg}`
            parentUl.appendChild(childLi)
        }

        addUser = () => {
            let username = document.getElementById('inputUsername').value
            if (username) {
                socket.emit("join", username)
            } else {
                displayMsg("username is missing")
            }
            document.getElementById('inputUsername').value = ""

        }

        displayMsg = (msg) => {
            document.getElementById('error').innerHTML = msg
            setTimeout(() => {
                document.getElementById('error').innerHTML = ""
            }, 3000)
        }
    </script>
</body>

</html>
